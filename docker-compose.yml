services:
  db:
    image: mysql/mysql-server:8.0
    platform: linux/arm64/v8
    container_name: bangla-news-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bangla_news_24}
      MYSQL_USER: ${MYSQL_USER:-bangla_news_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bangla_news_pass123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bangla-news-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DIALECT: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-bangla_news_24}
      DB_USER: ${MYSQL_USER:-bangla_news_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-bangla_news_pass123}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-bangla-news-admin}
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/app/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: bangla-news-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  mysql_data:
  backend_uploads:
